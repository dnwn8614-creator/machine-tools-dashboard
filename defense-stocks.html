  .btn-group button:hover:not(.active) { background: #334155; color: #e2e8f0; }

  STOCKS.forEach(name => {
    const d = RAW[name];
    const lastPrice = d.prices[d.prices.length - 1];
    const firstPrice = d.prices[0];
    const ret = ((lastPrice - firstPrice) / firstPrice * 100).toFixed(1);
    const isUp = ret >= 0;
    
    const lastRatio = [...d.ratios].reverse().find(r => r !== null);
    const firstRatio = d.ratios.find(r => r !== null);
    const ratioChg = lastRatio && firstRatio ? (lastRatio - firstRatio).toFixed(2) : null;
    const ratioUp = ratioChg > 0;
    
    container.innerHTML += `
      <div class="card" data-stock="${name}">
        <div class="card-name">${name}</div>
        <div class="card-code">${d.code}</div>
        <div class="card-price">${lastPrice.toLocaleString()}원</div>
        <div class="card-ret ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${ret}% <span style="font-size:0.75rem;font-weight:400;color:#64748b">(2년 수익률)</span></div>
        <div class="card-frgn">외인 지분율: <span>${lastRatio !== null ? lastRatio.toFixed(2) + '%' : 'N/A'}</span>
          ${ratioChg !== null ? `<span class="card-frgn-change ${ratioUp ? 'up' : 'down'}">&nbsp;(${ratioUp ? '+' : ''}${ratioChg}%p)</span>` : ''}
        </div>
      </div>`;
  });
}

// ── Build Stock Toggles ──────────────────────────────────────
function buildToggles() {
  const container = document.getElementById('stockToggles');
  STOCKS.forEach(name => {
    const color = COLORS[name];
    const div = document.createElement('div');
    div.className = 'stock-toggle active';
    div.style.setProperty('--color', color);
    div.innerHTML = `<span class="dot"></span>${name}`;
    div.onclick = () => {
      if (activeStocks.has(name)) {
        activeStocks.delete(name);
        div.classList.remove('active');
      } else {
        activeStocks.add(name);
        div.classList.add('active');
      }
      updateCharts();
    };
    container.appendChild(div);
  });
}

// ── Chart Config ──────────────────────────────────────────────
const commonOptions = {
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#0f172a',
      borderColor: '#334155',
      borderWidth: 1,
      titleColor: '#94a3b8',
      bodyColor: '#e2e8f0',
      padding: 10,
    }
  },
  scales: {
    x: {
      grid: { color: '#1e293b' },
      ticks: {
        color: '#64748b',
        maxTicksLimit: 12,
        font: { size: 11 }
      }
    },
    y: {
      grid: { color: '#1e293b' },
      ticks: { color: '#64748b', font: { size: 11 } }
    }
  },
  elements: { point: { radius: 0, hoverRadius: 4 }, line: { tension: 0.1, borderWidth: 2 } }
};

// Use first stock's dates as x-axis labels
const labels = RAW[STOCKS[0]].dates;

let priceChart, frgnChart;

function buildDatasets(mode) {
  return STOCKS.filter(n => activeStocks.has(n)).map(name => {
    const d = RAW[name];
    const data = mode === 'indexed' ? d.indexed : d.prices;
    return {
      label: name,
      data: data,
      borderColor: COLORS[name],
      backgroundColor: COLORS[name] + '18',
      fill: false,
    };
  });
}

function buildFrgnDatasets() {
  return STOCKS.filter(n => activeStocks.has(n)).map(name => {
    const d = RAW[name];
    return {
      label: name,
      data: d.ratios,
      borderColor: COLORS[name],
      backgroundColor: COLORS[name] + '18',
      fill: false,
      spanGaps: true,
    };
  });
}

function initCharts() {
  const priceCtx = document.getElementById('priceChart').getContext('2d');
  priceChart = new Chart(priceCtx, {
    type: 'line',
    data: { labels, datasets: buildDatasets('indexed') },
    options: {
      ...commonOptions,
      plugins: {
        ...commonOptions.plugins,
        tooltip: {
          ...commonOptions.plugins.tooltip,
          callbacks: {
            label: ctx => {
              const val = ctx.raw;
              if (priceMode === 'indexed') return ` ${ctx.dataset.label}: ${val?.toFixed(1)}`;
              return ` ${ctx.dataset.label}: ${val?.toLocaleString()}원`;
            }
          }
        }
      }
    }
  });

  const frgnCtx = document.getElementById('frgnChart').getContext('2d');
  frgnChart = new Chart(frgnCtx, {
    type: 'line',
    data: { labels, datasets: buildFrgnDatasets() },
    options: {
      ...commonOptions,
      plugins: {
        ...commonOptions.plugins,
        tooltip: {
          ...commonOptions.plugins.tooltip,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw?.toFixed(2)}%`
          }
        }
      },
      scales: {
        ...commonOptions.scales,
        y: {
          ...commonOptions.scales.y,
          ticks: { ...commonOptions.scales.y.ticks, callback: v => v + '%' }
        }
      }
    }
  });
}

function updateCharts() {
  priceChart.data.datasets = buildDatasets(priceMode);
  priceChart.update();
  frgnChart.data.datasets = buildFrgnDatasets();
  frgnChart.update();
}

function setPriceMode(mode) {
  priceMode = mode;
  document.querySelectorAll('#priceMode button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('priceModeDesc').textContent =
    mode === 'indexed' ? '2024.04.01 = 100 기준 인덱싱' : '원화 절대가격';
  updateCharts();
}

// Init
buildCards();
buildToggles();
initCharts();
</script>
</body>
</html>
