const STOCKS = Object.keys(RAW);
let activeStocks = new Set(STOCKS);
let priceMode = 'return';

// ── 카드 렌더 ──────────────────────────────────────────
const cardsEl = document.getElementById('cards');
STOCKS.forEach(code => {
  const s = RAW[code];
  const d = s.data;
  const first = d[0], last = d[d.length-1];
  const ret = ((last.close - first.close) / first.close * 100).toFixed(1);
  const cum = last.fcum;
  const cumStr = (cum >= 0 ? '+' : '') + cum.toLocaleString() + '주';
  const retClass = ret >= 0 ? 'pos' : 'neg';
  cardsEl.innerHTML += `
    <div class="card" style="--c:${s.color}">
      <div class="label">${code}</div>
      <div class="name">${s.name}</div>
      <div class="price">${last.close.toLocaleString()}원</div>
      <div class="ret ${retClass}">${ret >= 0 ? '▲' : '▼'} ${Math.abs(ret)}% (2년)</div>
      <div class="cum">외인 누적순매수: ${cumStr}</div>
    </div>`;
});

// ── 토글 버튼 ─────────────────────────────────────────
const btnsEl = document.getElementById('toggleBtns');
STOCKS.forEach(code => {
  const s = RAW[code];
  const btn = document.createElement('button');
  btn.className = 'toggle-btn active';
  btn.textContent = s.name;
  btn.style.borderColor = s.color;
  btn.style.color = s.color;
  btn.style.backgroundColor = s.color + '22';
  btn.dataset.code = code;
  btn.onclick = () => {
    if (activeStocks.has(code)) { activeStocks.delete(code); btn.classList.remove('active'); btn.style.backgroundColor='transparent'; }
    else { activeStocks.add(code); btn.classList.add('active'); btn.style.backgroundColor=s.color+'22'; }
    updatePriceChart();
    updateFrgnChart();
    updateFrgnBarChart();
  };
  btnsEl.appendChild(btn);
});

// ── 공통 x축 레이블 ────────────────────────────────────
const labels = RAW[STOCKS[0]].data.map(d => d.date);

// ── 주가 차트 ─────────────────────────────────────────
const priceCtx = document.getElementById('priceChart').getContext('2d');
const priceChart = new Chart(priceCtx, {
  type: 'line',
  data: { labels, datasets: [] },
  options: {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false }, tooltip: { callbacks: {
      label: ctx => {
        const code = STOCKS[ctx.datasetIndex];
        const raw = RAW[code].data[ctx.dataIndex];
        return ` ${RAW[code].name}: ${raw.close.toLocaleString()}원 (${ctx.parsed.y.toFixed(1)})`;
      }
    } } },
    scales: {
      x: { type: 'time', time: { unit: 'month' }, ticks: { color: '#64748b' }, grid: { color: '#1e293b' } },
      y: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }
    }
  }
});

function updatePriceChart() {
  priceChart.data.datasets = STOCKS.filter(c => activeStocks.has(c)).map(code => {
    const s = RAW[code];
    const base = s.data[0].close;
    return {
      label: s.name,
      data: priceMode === 'return'
        ? s.data.map(d => ({ x: d.date, y: +(d.close / base * 100).toFixed(2) }))
        : s.data.map(d => ({ x: d.date, y: d.close })),
      borderColor: s.color,
      backgroundColor: s.color + '15',
      borderWidth: 2,
      pointRadius: 0,
      fill: false,
      tension: 0.3
    };
  });
  priceChart.options.scales.y.ticks.callback = priceMode === 'return' ? v => v.toFixed(0) : v => v.toLocaleString();
  priceChart.update();
}

function setMode(m) {
  priceMode = m;
  document.getElementById('modeReturn').classList.toggle('active', m === 'return');
  document.getElementById('modeAbs').classList.toggle('active', m === 'abs');
  updatePriceChart();
}
updatePriceChart();

  type: 'line',

    responsive: true,

    }
  }

function updateFrgnChart() {

    const s = RAW[code];
    return {
      label: s.name,
      data: s.data.map(d => ({ x: d.date, y: d.fcum })),

      backgroundColor: s.color + '15',

      pointRadius: 0,
      fill: false,
      tension: 0.3
    };
  });
  frgnChart.update();
}
updateFrgnChart();

    }
  }
});

function updateFrgnBarChart() {
  barChart.data.datasets = STOCKS.filter(c => activeStocks.has(c)).map(code => {
    const s = RAW[code];
    return {
      label: s.name,
      data: s.data.map(d => ({ x: d.date, y: d.fnet })),
      backgroundColor: s.data.map(d => d.fnet >= 0 ? s.color + 'bb' : '#475569bb'),
      borderWidth: 0
    };
  });
  barChart.update();
}
